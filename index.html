<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGuide AI</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

header{
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.lang-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
}

/* HERO */
.hero{
  height:60vh;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://source.unsplash.com/1600x900/?airplane') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}

/* SEARCH */
.search{
  background:white;
  margin:-40px auto 30px;
  padding:20px;
  width:90%;
  max-width:900px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:250px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.price{ color:#d81e05; font-weight:bold; }

.book-btn{
  background:#d81e05;
  color:white;
  border:none;
  padding:8px;
  width:90%;
  margin:8px auto;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:12px;
  max-width:400px;
  text-align:center;
}

/* TEAM */
.team{
  text-align:center;
  padding:50px 20px;
  background:#f8f9fa;
}

.team img{
  max-width:650px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.15);
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>✈️ SkyGuide AI</h2>
  <button class="lang-btn" onclick="switchLang()">🌐 AR / EN</button>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Travel Smarter with AI</h1>
    <p>Your Intelligent Travel Assistant</p>
  </div>
</section>

<!-- SEARCH -->
<div class="search">
  <input placeholder="From (Abu Dhabi)">
  <input placeholder="To (Destination)">
  <button>Search Flights</button>
</div>

<!-- DESTINATIONS -->
<section style="text-align:center; padding:40px;">
<h2>Popular Destinations</h2>

<div class="cards">

  <div class="card" onclick="showInfo('london')">
    <img src="lon1.avif">
    <p>London</p>
    <button class="book-btn" onclick="book('London')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('paris')">
    <img src="paris1.jpg">
    <p>Paris</p>
    <button class="book-btn" onclick="book('Paris')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('bangkok')">
    <img src="thai.jpg">
    <p>Bangkok</p>
    <button class="book-btn" onclick="book('Bangkok')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('dubai')">
    <img src="dub1.jpg">
    <p>Dubai</p>
    <button class="book-btn" onclick="book('Dubai')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('newyork')">
    <img src="new1.jpg">
    <p>New York</p>
    <button class="book-btn" onclick="book('New York')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('istanbul')">
    <img src="ist1.jpg">
    <p>Istanbul</p>
    <button class="book-btn" onclick="book('Istanbul')">Book Now</button>
  </div>

</div>
</section>

<!-- TEAM -->
<section class="team">
  <h2>Our Team</h2>
  <p style="margin:15px 0;">Grade 11 AI Project Group</p>

  <img src="ourteam.png" onclick="zoomPhoto()">

  <p style="margin-top:20px; font-weight:bold;">
    Mahra Alzaabi, Sarah Hussein, Sarah Alnuaimi, Fatema Mohamed, Shamma Hamad
  </p>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="title"></h2>
    <p id="info"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

function showInfo(city){
  let modal=document.getElementById("modal");
  let title=document.getElementById("title");
  let info=document.getElementById("info");

  let data={
    london:"7h 30m • AED 2850",
    paris:"7h 10m • AED 3150",
    bangkok:"6h 45m • AED 2450",
    dubai:"1h • AED 500",
    newyork:"14h • AED 4200",
    istanbul:"5h • AED 1800"
  };

  title.innerText=city.toUpperCase();
  info.innerText=data[city];
  modal.style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function book(city){
  alert("🎟 Booking confirmed for " + city + " (Demo)");
}

function zoomPhoto(){
  alert("📸 Group Photo - SkyGuide AI Team");
}

function switchLang(){
  alert("🌐 Arabic / English Switch Ready");
}

</script>

</body>
</html>
