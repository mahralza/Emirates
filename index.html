<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGuide AI</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

/* HEADER */
header{
  background:#111;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.lang-btn{
  font-size:11px;
  padding:5px 10px;
  border-radius:10px;
}

/* BANNER */
.banner{
  height:55vh;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background-size:cover;
  transition:1s;
}

/* CARDS */
.cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.card{
  width:240px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  text-align:center;
}
.card img{width:100%;height:150px;object-fit:cover}

/* BUTTON */
.btn{
  background:#d81e05;
  color:white;
  border:none;
  padding:10px;
  width:90%;
  margin:10px;
  border-radius:8px;
}

/* AI CHAT */
.chat{
  position:fixed;
  bottom:10px;
  right:10px;
  width:280px;
  background:white;
  border-radius:10px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.chat-body{
  height:200px;
  overflow:auto;
  padding:10px;
  background:#eee;
}

.msg{padding:8px;margin:5px;border-radius:10px}
.user{background:#004aad;color:white;margin-left:auto}
.ai{background:#ddd}

/* PAGES */
.page{display:none;padding:30px}
.active{display:block}
</style>
</head>

<body>

<header>
  <div>✈️ SkyGuide AI</div>
  <button class="lang-btn" onclick="lang()">AR / EN</button>
</header>

<!-- BANNER SLIDER -->
<div class="banner" id="banner">
  <div>
    <h1>Travel Smarter with AI</h1>
    <p>Book Flights Instantly</p>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<h2 style="text-align:center;margin:20px;">Destinations</h2>

<div class="cards">

  <div class="card" onclick="city('london')">
    <img src="lon1.avif"><p>London</p>
  </div>

  <div class="card" onclick="city('paris')">
    <img src="paris1.jpg"><p>Paris</p>
  </div>

  <div class="card" onclick="city('bangkok')">
    <img src="thai.jpg"><p>Bangkok</p>
  </div>

  <div class="card" onclick="city('dubai')">
    <img src="dub1.jpg"><p>Dubai</p>
  </div>

  <div class="card" onclick="city('newyork')">
    <img src="new1.jpg"><p>New York</p>
  </div>

  <div class="card" onclick="city('istanbul')">
    <img src="ist1.jpg"><p>Istanbul</p>
  </div>

</div>
</div>

<!-- CITY -->
<div id="city" class="page">
  <h2 id="cname"></h2>
  <p id="cinfo"></p>
  <button class="btn" onclick="book()">Book Now</button>
  <button class="btn" onclick="home()">Back</button>
</div>

<!-- BOOK -->
<div id="book" class="page">
  <h2 style="text-align:center">Booking Confirmed 🎟</h2>
  <p id="btxt" style="text-align:center"></p>
  <button class="btn" onclick="home()">Home</button>
</div>

<!-- TEAM -->
<section style="text-align:center;padding:40px">
<h2>Our Team</h2>
<p>Grade 11 AI Project Group</p>
<img src="ourteam.png" style="width:60%;border-radius:10px">
<p style="margin-top:15px">
Mahra Alzaabi, Sarah Hussein, Sarah Alnuaimi, Fatema Mohamed, Shamma Hamad
</p>
</section>

<!-- AI CHAT -->
<div class="chat">
  <div style="background:#002d62;color:white;padding:10px">AI Assistant</div>
  <div class="chat-body" id="chat"></div>
  <input id="input" placeholder="Ask AI..." style="width:100%;padding:10px;border:none" onkeypress="enter(event)">
</div>

<script>

/* BANNER SLIDER */
let banners=[
 "url('https://source.unsplash.com/1600x900/?airplane,travel')",
 "url('https://source.unsplash.com/1600x900/?dubai,skyline')",
 "url('https://source.unsplash.com/1600x900/?airport')"
];
let i=0;
setInterval(()=>{
 document.getElementById("banner").style.backgroundImage=banners[i];
 i=(i+1)%banners.length;
},3000);

/* NAV */
function show(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function home(){show("home")}

/* CITY */
let current="";
function city(c){
 current=c;

 let data={
  london:"7h 30m • AED 2850",
  paris:"7h 10m • AED 3150",
  bangkok:"6h 45m • AED 2450",
  dubai:"1h • AED 500",
  newyork:"14h • AED 4200",
  istanbul:"5h • AED 1800"
 };

 document.getElementById("cname").innerText=c.toUpperCase();
 document.getElementById("cinfo").innerText=data[c];
 show("city");
}

function book(){
 document.getElementById("btxt").innerText=
 "Your trip to " + current + " is confirmed (Demo AI System)";
 show("book");
}

/* AI CHAT (SMART RESPONSES) */
function enter(e){
 if(e.key==="Enter"){
  let t=document.getElementById("input").value;
  let chat=document.getElementById("chat");

  chat.innerHTML+=`<div class='msg user'>${t}</div>`;

  let reply="I can help you find flights ✈️";

  if(t.toLowerCase().includes("london"))
   reply="London: AED 2850 | 7h 30m direct flight";

  else if(t.toLowerCase().includes("dubai"))
   reply="Dubai: AED 500 | 1h flight";

  else if(t.toLowerCase().includes("price"))
   reply="Prices start from AED 500 depending on destination";

  chat.innerHTML+=`<div class='msg ai'>${reply}</div>`;

  document.getElementById("input").value="";
 }
}

/* LANGUAGE */
function lang(){
 alert("🌐 Arabic / English system ready (can be expanded)");
}

</script>

</body>
</html>
