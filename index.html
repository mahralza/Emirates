<!-- ================= AI CHAT + BANNER ADD-ON ================= -->

<!-- BANNER -->
<div id="banner" style="
height:50vh;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('https://source.unsplash.com/1600x900/?airport') center/cover;
background-size:cover;
transition:1s;
">
  <div>
    <h1>SkyGuide AI</h1>
    <p>Smart Travel Assistant</p>
  </div>
</div>

<!-- AI CHAT BOX -->
<div style="
position:fixed;
bottom:15px;
right:15px;
width:280px;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
overflow:hidden;
font-family:Arial;
">

  <div style="background:#002d62;color:white;padding:10px;text-align:center;">
    AI Assistant
  </div>

  <div id="chatBox" style="height:200px;overflow:auto;padding:10px;background:#f2f2f2;">
    <div style="margin:5px;background:#ddd;padding:8px;border-radius:10px;">
      Hello! Ask me about flights ✈️
    </div>
  </div>

  <input id="userInput" placeholder="Type message..."
  style="width:100%;padding:10px;border:none;"
  onkeypress="if(event.key==='Enter')sendAI()">
</div>

<script>

/* ================= BANNER SLIDER ================= */
let banners = [
 "url('https://source.unsplash.com/1600x900/?airplane')",
 "url('https://source.unsplash.com/1600x900/?dubai,skyline')",
 "url('https://source.unsplash.com/1600x900/?airport,travel')"
];

let i = 0;

setInterval(()=>{
  document.getElementById("banner").style.backgroundImage = banners[i];
  i = (i + 1) % banners.length;
}, 4000);

/* ================= AI CHAT ================= */
function sendAI(){
  let input = document.getElementById("userInput");
  let text = input.value.toLowerCase();

  if(!text) return;

  let chat = document.getElementById("chatBox");

  chat.innerHTML += `<div style="background:#004aad;color:white;padding:8px;margin:5px;border-radius:10px;text-align:right;">
    ${input.value}
  </div>`;

  let reply = "I can help you find flights ✈️";

  if(text.includes("london"))
    reply = "London flight: AED 2850 | 7h 30m direct";

  else if(text.includes("paris"))
    reply = "Paris flight: AED 3150 | 7h 10m direct";

  else if(text.includes("dubai"))
    reply = "Dubai flight: AED 500 | 1h only";

  else if(text.includes("price"))
    reply = "Prices start from AED 500 depending on destination";

  else if(text.includes("hello") || text.includes("hi"))
    reply = "Hello 👋 I can help you book flights anywhere!";

  chat.innerHTML += `<div style="background:#ddd;padding:8px;margin:5px;border-radius:10px;">
    ${reply}
  </div>`;

  chat.scrollTop = chat.scrollHeight;
  input.value = "";
}

</script>
