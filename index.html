<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGuide AI</title>

<style>
body{font-family:Arial;margin:0}
header{background:#111;color:white;padding:15px;display:flex;justify-content:space-between}
.hero{height:50vh;background:url('https://source.unsplash.com/1600x900/?airplane') center/cover;color:white;display:flex;align-items:center;justify-content:center}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:40px}
.card{width:250px;background:white;border-radius:10px;overflow:hidden;text-align:center;cursor:pointer}
.card img{width:100%;height:150px;object-fit:cover}
.book-btn{background:red;color:white;border:none;padding:8px;width:90%;margin:8px;border-radius:8px}
.chat{position:fixed;bottom:10px;right:10px;width:260px;background:white;border-radius:10px;overflow:hidden}
.chat-body{height:200px;overflow:auto;padding:10px;background:#eee}
.msg{padding:8px;margin:5px;border-radius:10px}
.user{background:#004aad;color:white;text-align:right}
.ai{background:#ddd}
</style>
</head>

<body>

<header>
<h2>✈️ SkyGuide AI</h2>
</header>

<div class="hero">
<h1>Travel Smarter with AI</h1>
</div>

<section class="cards">

<div class="card">
<img src="dub1.jpg">
<p>Dubai</p>
<button class="book-btn">Book Now</button>
</div>

<div class="card">
<img src="new1.jpg">
<p>New York</p>
<button class="book-btn">Book Now</button>
</div>

<div class="card">
<img src="ist1.jpg">
<p>Istanbul</p>
<button class="book-btn">Book Now</button>
</div>

</section>

<!-- CHAT -->
<div class="chat">
<div style="background:#002d62;color:white;padding:10px;text-align:center">
AI Assistant
</div>
<div class="chat-body" id="chat"></div>
<input id="input" placeholder="Ask AI..." onkeypress="enter(event)">
</div>

<script>
async function sendToAI(message){
  const res = await fetch("http://localhost:3000/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({message})
  });
  const data = await res.json();
  return data.reply;
}

async function enter(e){
  if(e.key==="Enter"){
    let input=document.getElementById("input");
    let chat=document.getElementById("chat");

    chat.innerHTML+=`<div class='msg user'>${input.value}</div>`;

    let reply=await sendToAI(input.value);

    chat.innerHTML+=`<div class='msg ai'>${reply}</div>`;
    input.value="";
  }
}
</script>

</body>
</html>
