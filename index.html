<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGuide AI</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

header{
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.lang-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:12px;
  border:none;
}

/* HERO (replaces banner) */
.hero{
  height:50vh;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://source.unsplash.com/1600x900/?airplane') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

/* SEARCH */
.search{
  background:white;
  margin:-40px auto 30px;
  padding:20px;
  width:90%;
  max-width:900px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:250px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.book-btn{
  background:#d81e05;
  color:white;
  border:none;
  padding:8px;
  width:90%;
  margin:8px auto;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

/* TEAM */
.team{
  text-align:center;
  padding:50px;
  background:#f8f9fa;
}

/* CHAT */
.chat{
  position:fixed;
  bottom:15px;
  right:15px;
  width:260px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.chat-body{
  height:200px;
  overflow:auto;
  padding:10px;
  background:#eee;
}

.msg{padding:8px;margin:5px;border-radius:10px}
.user{background:#004aad;color:white;text-align:right}
.ai{background:#ddd}
</style>
</head>

<body>

<header>
  <h2>✈️ SkyGuide AI</h2>
  <button class="lang-btn">🌐 AR / EN</button>
</header>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Travel Smarter with AI</h1>
    <p>Plan your trip in seconds</p>
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input placeholder="From (Abu Dhabi)">
  <input placeholder="To (Destination)">
  <button>Search Flights</button>
</div>

<!-- DESTINATIONS -->
<section style="text-align:center;padding:40px;">
<h2>Popular Destinations</h2>

<div class="cards">

  <div class="card" onclick="showInfo('london')">
    <img src="lon1.avif">
    <p>London</p>
    <button class="book-btn" onclick="book('London')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('paris')">
    <img src="paris1.jpg">
    <p>Paris</p>
    <button class="book-btn" onclick="book('Paris')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('bangkok')">
    <img src="thai.jpg">
    <p>Bangkok</p>
    <button class="book-btn" onclick="book('Bangkok')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('dubai')">
    <img src="dub1.jpg">
    <p>Dubai</p>
    <button class="book-btn" onclick="book('Dubai')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('newyork')">
    <img src="new1.jpg">
    <p>New York</p>
    <button class="book-btn" onclick="book('New York')">Book Now</button>
  </div>

  <div class="card" onclick="showInfo('istanbul')">
    <img src="ist1.jpg">
    <p>Istanbul</p>
    <button class="book-btn" onclick="book('Istanbul')">Book Now</button>
  </div>

</div>
</section>

<!-- TEAM -->
<section class="team">
  <h2>Our Team</h2>
  <p>Mahra Alzaabi, Sarah Hussein, Sarah Alnuaimi, Fatema Mohamed, Shamma Hamad</p>
  <img src="ourteam.png" style="max-width:600px;border-radius:15px;margin-top:20px;">
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="title"></h2>
    <p id="info"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- CHAT -->
<div class="chat">
  <div style="background:#002d62;color:white;padding:10px;text-align:center;">
    AI Assistant
  </div>
  <div class="chat-body" id="chat"></div>
  <input id="input" placeholder="Ask me anything..." onkeypress="enter(event)">
</div>

<script>

/* MODAL */
function showInfo(city){
  let data={
    london:"Flight ~7h 30m | AED 2850",
    paris:"Flight ~7h 10m | AED 3150",
    bangkok:"Flight ~6h 45m | AED 2450",
    dubai:"Flight ~1h | AED 500",
    newyork:"Flight ~14h | AED 4200",
    istanbul:"Flight ~5h | AED 1800"
  };
  document.getElementById("title").innerText=city.toUpperCase();
  document.getElementById("info").innerText=data[city];
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* BOOK */
function book(city){
  alert("🎟 Booking for " + city + " (Demo)");
}

/* SMART AI CHAT */
function enter(e){
  if(e.key==="Enter"){
    let text=document.getElementById("input").value.toLowerCase();
    let chat=document.getElementById("chat");

    chat.innerHTML+=`<div class='msg user'>${text}</div>`;

    let reply="Tell me where you want to go ✈️";

    if(text.includes("london"))
      reply="Flights to London cost around AED 2850 and take 7h 30m.";

    else if(text.includes("dubai"))
      reply="Dubai flights are very short (1h) and cost around AED 500.";

    else if(text.includes("price"))
      reply="Prices range from AED 500 to AED 4200 depending on destination.";

    else if(text.includes("hello"))
      reply="Hello! Where would you like to travel?";

    chat.innerHTML+=`<div class='msg ai'>${reply}</div>`;
    document.getElementById("input").value="";
  }
}

</script>

</body>
</html>
