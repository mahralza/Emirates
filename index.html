<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyGuide AI</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

/* HEADER */
header {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* smaller language button */
.lang-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:15px;
  border:none;
  cursor:pointer;
}

/* HERO */
.hero {
  height:60vh;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://source.unsplash.com/1600x900/?airplane') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}
.hero button {
  padding:12px 25px;
  margin-top:20px;
  background:red;
  color:white;
  border:none;
  border-radius:25px;
}

/* SEARCH */
.search {
  background:white;
  margin:-40px auto 30px;
  padding:20px;
  width:90%;
  max-width:900px;
  border-radius:10px;
}
input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* CARDS */
.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:white;
  width:250px;
  border-radius:10px;
  overflow:hidden;
  text-align:center;
  padding-bottom:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

/* BOOK BUTTON */
.book-btn{
  background:#d81e05;
  color:white;
  border:none;
  padding:8px;
  width:90%;
  margin:8px auto;
  border-radius:8px;
  cursor:pointer;
}

/* CHAT */
.chat {
  position:fixed;
  bottom:10px;
  right:10px;
  width:300px;
  background:white;
  border-radius:10px;
}
.chat-body {
  height:250px;
  overflow:auto;
  padding:10px;
  background:#eee;
}
.msg { padding:8px; margin:5px; border-radius:10px; }
.user { background:blue; color:white; margin-left:auto; }
.ai { background:#ddd; }
</style>
</head>

<body>

<header>
  <h2>✈️ SkyGuide AI</h2>
  <button class="lang-btn" onclick="switchLang()">🌐 AR / EN</button>
</header>

<section class="hero">
  <div>
    <h1 id="heroTitle">Travel Smarter with AI</h1>
    <p id="heroText">Plan your trip in seconds</p>
    <button id="startBtn" onclick="scrollSearch()">Start</button>
  </div>
</section>

<!-- SEARCH -->
<div class="search" id="search">
  <input id="from" placeholder="From (Abu Dhabi)">
  <input id="to" placeholder="To (London)">
  <input type="date" id="date">
  <button onclick="searchFlights()">Search Flights</button>
  <div id="results"></div>
</div>

<!-- DESTINATIONS -->
<section style="text-align:center;padding:40px;">
<h2>Popular Destinations</h2>

<div class="cards">

  <div class="card">
    <img src="https://source.unsplash.com/300x200/?london">
    <p>London</p>
    <button class="book-btn">Book Now</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/300x200/?paris">
    <p>Paris</p>
    <button class="book-btn">Book Now</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/300x200/?bangkok">
    <p>Bangkok</p>
    <button class="book-btn">Book Now</button>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/300x200/?dubai">
    <p>Dubai</p>
    <button class="book-btn">Book Now</button>
  </div>

  <div class="card">
    <img src="new1.jpg">
    <p>New York</p>
    <button class="book-btn">Book Now</button>
  </div>

  <div class="card">
    <img src="ist1.jpg">
    <p>Istanbul</p>
    <button class="book-btn">Book Now</button>
  </div>

</div>
</section>

<script>

let lang="en";

function switchLang(){
  if(lang==="en"){
    lang="ar";
    document.getElementById("heroTitle").innerText="سافر بذكاء باستخدام الذكاء الاصطناعي";
    document.getElementById("heroText").innerText="خطط رحلتك بسهولة";
    document.getElementById("startBtn").innerText="ابدأ";
  } else {
    lang="en";
    location.reload();
  }
}

function scrollSearch(){
  document.getElementById("search").scrollIntoView({behavior:"smooth"});
}

function searchFlights(){
  let to=document.getElementById("to").value.toLowerCase();
  let result=document.getElementById("results");

  let data={
    london:{price:2850,time:"7h 30m"},
    paris:{price:3150,time:"7h"},
    bangkok:{price:2450,time:"6h 45m"},
    dubai:{price:500,time:"1h"},
    "new york":{price:4200,time:"14h"},
    istanbul:{price:1800,time:"5h"}
  };

  if(data[to]){
    result.innerHTML=`✈️ ${to}<br>💰 AED ${data[to].price}<br>⏱ ${data[to].time}`;
  } else {
    result.innerHTML="No data available";
  }
}

</script>

</body>
</html>
