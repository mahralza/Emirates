<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyGuide AI</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
    body { background:#f5f7fa; }

    header{
      background:#111; color:white; padding:15px;
      display:flex; justify-content:space-between; align-items:center;
    }

    .lang-btn{
      padding:6px 10px; font-size:12px; border-radius:12px;
      border:none; cursor:pointer;
    }

    .hero{
      height:50vh;
      background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
      url('https://source.unsplash.com/1600x900/?airplane') center/cover;
      display:flex; align-items:center; justify-content:center;
      color:white; text-align:center;
    }

    .search{
      background:white;
      margin:-40px auto 30px;
      padding:20px;
      width:90%;
      max-width:900px;
      border-radius:10px;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    .search input, .search button{
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
    }

    .search input{
      border:1px solid #ddd;
    }

    .search button{
      background:#004aad;
      color:white;
      border:none;
      cursor:pointer;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin-top:20px;
    }

    .card{
      width:250px;
      background:white;
      border-radius:10px;
      overflow:hidden;
      text-align:center;
      cursor:pointer;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    .card img{
      width:100%;
      height:150px;
      object-fit:cover;
    }

    .book-btn{
      background:#d81e05;
      color:white;
      border:none;
      padding:8px;
      width:90%;
      margin:8px auto 12px;
      border-radius:8px;
      cursor:pointer;
    }

    .modal{
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-content{
      background:white;
      padding:25px;
      border-radius:12px;
      text-align:center;
      min-width:280px;
    }

    .team{
      text-align:center;
      padding:50px 20px;
      background:#f8f9fa;
      margin-top:40px;
    }

    .chat{
      position:fixed;
      bottom:15px;
      right:15px;
      width:300px;
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 10px 20px rgba(0,0,0,0.3);
      z-index:1001;
    }

    .chat-header{
      background:#002d62;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .chat-header button{
      background:transparent;
      color:white;
      border:none;
      font-size:18px;
      cursor:pointer;
    }

    .chat-body{
      height:220px;
      overflow-y:auto;
      padding:10px;
      background:#eee;
    }

    .chat-input{
      display:flex;
      gap:5px;
      padding:10px;
      border-top:1px solid #ddd;
      background:#fff;
    }

    .chat-input input{
      flex:1;
      padding:10px;
      border:1px solid #ccc;
      border-radius:8px;
    }

    .chat-input button{
      padding:10px 12px;
      border:none;
      border-radius:8px;
      background:#004aad;
      color:white;
      cursor:pointer;
    }

    .msg{
      padding:8px;
      margin:5px 0;
      border-radius:10px;
      max-width:85%;
      word-wrap:break-word;
    }

    .user{
      background:#004aad;
      color:white;
      margin-left:auto;
      text-align:right;
    }

    .ai{
      background:#ddd;
      color:#111;
      margin-right:auto;
    }

    .hidden{
      display:none !important;
    }

    #searchResult{
      margin-top:10px;
      color:#004aad;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <header>
    <h2>✈️ SkyGuide AI</h2>
    <button class="lang-btn">🌐 AR / EN</button>
  </header>

  <div class="hero">
    <div>
      <h1>Travel Smarter with AI</h1>
      <p>Plan your trip in seconds</p>
    </div>
  </div>

  <div class="search">
    <input id="fromInput" placeholder="From (Abu Dhabi)">
    <input id="toInput" placeholder="To (Destination)">
    <button onclick="searchFlights()">Search Flights</button>
    <p id="searchResult"></p>
  </div>

  <section style="text-align:center;padding:40px;">
    <h2>Popular Destinations</h2>
    <div class="cards">
      <div class="card" onclick="showInfo('london')">
        <img src="lon1.avif" alt="London">
        <p>London</p>
        <button class="book-btn" onclick="event.stopPropagation(); book('London')">Book Now</button>
      </div>

      <div class="card" onclick="showInfo('paris')">
        <img src="paris1.jpg" alt="Paris">
        <p>Paris</p>
        <button class="book-btn" onclick="event.stopPropagation(); book('Paris')">Book Now</button>
      </div>

      <div class="card" onclick="showInfo('bangkok')">
        <img src="thai.jpg" alt="Bangkok">
        <p>Bangkok</p>
        <button class="book-btn" onclick="event.stopPropagation(); book('Bangkok')">Book Now</button>
      </div>

      <div class="card" onclick="showInfo('dubai')">
        <img src="dub1.jpg" alt="Dubai">
        <p>Dubai</p>
        <button class="book-btn" onclick="event.stopPropagation(); book('Dubai')">Book Now</button>
      </div>

      <div class="card" onclick="showInfo('newyork')">
        <img src="new1.jpg" alt="New York">
        <p>New York</p>
        <button class="book-btn" onclick="event.stopPropagation(); book('New York')">Book Now</button>
      </div>

      <div class="card" onclick="showInfo('istanbul')">
        <img src="ist1.jpg" alt="Istanbul">
        <p>Istanbul</p>
        <button class="book-btn" onclick="event.stopPropagation(); book('Istanbul')">Book Now</button>
      </div>
    </div>
  </section>

  <section class="team">
    <h2>Our Team</h2>
    <p>Mahra Alzaabi, Sarah Hussein, Sarah Alnuaimi, Fatema Mohamed, Shamma Hamad</p>
    <img src="ourteam.png" style="max-width:600px;width:100%;border-radius:15px;margin-top:20px;" alt="Our Team">
  </section>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="title"></h2>
      <p id="info"></p>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <div class="chat" id="chatBox">
    <div class="chat-header">
      <span>AI Assistant</span>
      <button onclick="toggleChat()">×</button>
    </div>

    <div class="chat-body" id="chat"></div>

    <div class="chat-input">
      <input id="input" placeholder="Ask me anything..." onkeypress="enter(event)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const cityData = {
      london: "Flight ~7h 30m | AED 2850",
      paris: "Flight ~7h 10m | AED 3150",
      bangkok: "Flight ~6h 45m | AED 2450",
      dubai: "Flight ~1h | AED 500",
      newyork: "Flight ~14h | AED 4200",
      istanbul: "Flight ~5h | AED 1800"
    };

    function showInfo(city) {
      document.getElementById("title").innerText = city.toUpperCase();
      document.getElementById("info").innerText = cityData[city];
      document.getElementById("modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    function book(city) {
      alert("🎟 Booking for " + city + " (Demo)");
    }

    function searchFlights() {
      const from = document.getElementById("fromInput").value.trim();
      const to = document.getElementById("toInput").value.trim();
      const result = document.getElementById("searchResult");

      if (!from || !to) {
        result.innerText = "Please enter both departure and destination.";
        return;
      }

      const key = to.toLowerCase().replace(/\s+/g, "");
      if (cityData[key]) {
        result.innerText = `From ${from} to ${to}: ${cityData[key]}`;
      } else {
        result.innerText = `Search result for ${from} → ${to}: no demo data available yet.`;
      }
    }

    function toggleChat() {
      document.getElementById("chatBox").classList.toggle("hidden");
    }

    function addMessage(text, type) {
      const chat = document.getElementById("chat");
      const msg = document.createElement("div");
      msg.className = `msg ${type}`;
      msg.innerText = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      addMessage("Thinking...", "ai");

      try {
        const res = await fetch("http://localhost:3000/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        const chat = document.getElementById("chat");
        if (chat.lastChild) chat.lastChild.remove();

        addMessage(data.reply || "Sorry, I couldn't answer that.", "ai");
      } catch (err) {
        const chat = document.getElementById("chat");
        if (chat.lastChild) chat.lastChild.remove();

        addMessage("Error connecting to assistant.", "ai");
      }
    }

    function enter(e) {
      if (e.key === "Enter") sendMessage();
    }

    addMessage("Hello! Ask me about flights, prices, or destinations.", "ai");
  </script>
</body>
</html>
