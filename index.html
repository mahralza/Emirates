<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyGuide AI - Smart Travel Assistant</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #0a3d62, #1e90ff);
      color: white;
    }
    header {
      background: rgba(0,0,0,0.7);
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 28px;
      font-weight: bold;
    }
    .chat-container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      color: black;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .chat-header {
      background: #0a3d62;
      padding: 20px;
      text-align: center;
      color: white;
    }
    .chat-body {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .message {
      margin: 15px 0;
      padding: 12px 18px;
      border-radius: 18px;
      max-width: 80%;
    }
    .user {
      background: #1e90ff;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 5px;
    }
    .ai {
      background: #e9ecef;
      margin-right: auto;
      border-bottom-left-radius: 5px;
    }
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
    }
    input {
      flex: 1;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 30px;
      font-size: 16px;
    }
    button {
      margin-left: 10px;
      padding: 0 30px;
      background: #1e90ff;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }
    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #0a3d62;
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">✈️ SkyGuide AI</div>
    <div>
      <button onclick="switchLanguage()">AR / EN</button>
    </div>
  </header>

  <div class="chat-container">
    <div class="chat-header">
      <h2>AI Travel Assistant</h2>
      <p>Your smart airline booking helper from Abu Dhabi</p>
    </div>
    
    <div class="chat-body" id="chatBody">
      <div class="message ai">
        Hello! I'm SkyGuide AI 🌟<br>
        How can I help you with your trip today?<br>
        Example: "Find cheap flights from Abu Dhabi to London next month"
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your travel request here..." onkeypress="handleKey(event)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      const chatBody = document.getElementById("chatBody");

      // User message
      chatBody.innerHTML += `
        <div class="message user">${message}</div>
      `;

      // Simulate AI response
      setTimeout(() => {
        let reply = `
          <div class="message ai">
            Here are the best options for you:<br><br>
            <table>
              <tr><th>Flight</th><th>Departure</th><th>Price (AED)</th><th>Duration</th></tr>
              <tr><td>Etihad EY-11</td><td>10:00 AM</td><td>2,450</td><td>7h 30m</td></tr>
              <tr><td>Emirates EK-123</td><td>02:15 PM</td><td>2,780</td><td>7h 45m</td></tr>
            </table>
            <br>
            💡 Tip: Book soon for better prices!<br>
            ⚠️ Please check real prices on <b>etihad.com</b> or <b>emirates.com</b>
          </div>
        `;
        chatBody.innerHTML += reply;
        chatBody.scrollTop = chatBody.scrollHeight;
      }, 800);

      input.value = "";
    }

    function handleKey(e) {
      if (e.key === "Enter") sendMessage();
    }

    function switchLanguage() {
      alert("Language switched to Arabic 🇦🇪 (RTL support coming in full version)");
    }
  </script>

</body>
</html>
