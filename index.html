<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyGuide AI - Smart Travel Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; }

    header {
      background: #1e1e1e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 26px; font-weight: bold; }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://source.unsplash.com/random/1600x900/?airplane') center/cover;
      height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    section { padding: 50px 20px; }

    /* Floating Chat */
    .chat-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 360px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      overflow: hidden;
      z-index: 1000;
      display: none;
    }
    .chat-header {
      background: #002d62;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-body {
      height: 380px;
      overflow-y: auto;
      padding: 15px;
      background: #f8f9fa;
    }
    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 85%;
    }
    .ai { background: #e9ecef; }
    .user { background: #002d62; color: white; margin-left: auto; text-align: right; }

    .chat-input {
      padding: 12px;
      background: white;
      display: flex;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 25px;
    }
    .chat-input button {
      padding: 0 20px;
      background: #002d62;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }

    /* Floating Icon */
    .chat-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: #002d62;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 999;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">✈️ SkyGuide AI</div>
    <button onclick="switchLanguage()" style="padding:8px 16px; border-radius:20px;">🇦🇪 AR / EN</button>
  </header>

  <!-- Hero + other sections (same as before) -->
  <section class="hero">
    <div>
      <h1>Travel Smarter with AI</h1>
      <p>Your Intelligent Travel Assistant from Abu Dhabi</p>
    </div>
  </section>

  <!-- Your destinations and team sections here... -->
  <!-- (Keep your existing destinations and team photo) -->

  <!-- Floating Chat Icon -->
  <div class="chat-icon" id="chatIcon" onclick="toggleChat()">
    💬
  </div>

  <!-- Chat Window -->
  <div class="chat-container" id="chatContainer">
    <div class="chat-header">
      <span>SkyGuide AI Assistant</span>
      <button onclick="toggleChat()" style="background:none; border:none; color:white; font-size:24px;">×</button>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="message ai">Hello! How can I help you plan your trip today?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function toggleChat() {
      const chat = document.getElementById('chatContainer');
      const icon = document.getElementById('chatIcon');
      
      if (chat.style.display === "block") {
        chat.style.display = "none";
        icon.style.display = "flex";
      } else {
        chat.style.display = "block";
        icon.style.display = "none";
      }
    }

    function sendMessage() {
      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if (!text) return;

      const chatBody = document.getElementById("chatBody");
      chatBody.innerHTML += `<div class="message user">${text}</div>`;

      setTimeout(() => {
        let reply = "I can help you with flight suggestions. What is your destination?";
        if (text.toLowerCase().includes("london")) reply = "London: AED 2,850+, 7h 30m direct.";
        else if (text.toLowerCase().includes("paris")) reply = "Paris: AED 3,150+, 7h 10m direct.";
        else if (text.toLowerCase().includes("bangkok")) reply = "Bangkok: AED 2,450+, 6h 45m direct.";

        chatBody.innerHTML += `<div class="message ai">${reply}</div>`;
        chatBody.scrollTop = chatBody.scrollHeight;
      }, 800);

      input.value = "";
    }

    function handleKey(e) {
      if (e.key === "Enter") sendMessage();
    }

    function switchLanguage() {
      alert("Language switch (AR/EN) is ready");
    }
  </script>
</body>
</html>
